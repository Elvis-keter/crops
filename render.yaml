services:
  - type: web
    name: smartseason-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString

databases:
  - name: smartseason-db
    databaseName: smartseason
    user: postgres